# 📘 WHAT THIS FILE DOES: Tells Railway how to build and run this app.
# Railway reads this file automatically when it pulls from GitHub.
# 🔗 Railway config reference: https://docs.railway.com/reference/config-as-code

[build]
# 📘 'dockerfile' builder means Railway will follow our Dockerfile instructions.
# The alternative is 'nixpacks' (Railway's auto-detect system) but we need
# explicit control to install FFmpeg.
builder      = "dockerfile"
dockerfilePath = "Dockerfile"   # relative to this file's directory (web/)

[deploy]
# 📘 The healthcheck tells Railway how to verify the app started successfully.
# Railway will ping this path after deploying — if it gets a 200 response, deploy succeeds.
healthcheckPath    = "/"
healthcheckTimeout = 60         # wait up to 60 seconds for the app to respond

# 📘 If the deploy fails, Railway will restart automatically up to 3 times.
restartPolicyType  = "on_failure"
restartPolicyMaxRetries = 3
